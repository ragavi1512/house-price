<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trends — House Price Prediction</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <style>
    :root { --sidebar:#0b1220; --sidebar-border:#152036; --sidebar-text:#9fb0c8; --sidebar-active-bg:rgba(13,148,136,0.18);
      --page-bg:#f1f5f9; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --shadow:0 10px 40px rgba(15,23,42,0.06); --radius:12px;
      font-family:"Segoe UI",system-ui,sans-serif; line-height:1.45; color:var(--text); background:var(--page-bg); }
    body.theme-dark { --page-bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --border:#1f2937; --shadow:0 10px 40px rgba(0,0,0,0.35); }
    *{box-sizing:border-box;} body{margin:0;min-height:100vh;display:flex;} a{color:inherit;text-decoration:none;}
    .layout{display:flex;width:100%;min-height:100vh;}
    .sidebar{width:260px;flex-shrink:0;background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;border-right:1px solid var(--sidebar-border);height:100vh;position:sticky;top:0;}
    .logo{display:flex;align-items:center;gap:.65rem;padding:1.25rem 1.1rem;font-weight:700;color:#e2e8f0;font-size:.95rem;border-bottom:1px solid var(--sidebar-border);}
    .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#14b8a6,#0f766e);display:grid;place-items:center;font-size:1.1rem;}
    .nav-scroll{flex:1;overflow-y:auto;padding:.75rem .5rem;}
    .nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .85rem;border-radius:10px;font-size:.9rem;color:var(--sidebar-text);margin-bottom:2px;}
    .nav-item:hover{background:rgba(255,255,255,.05);color:#e2e8f0;}
    .nav-item.active{background:var(--sidebar-active-bg);color:#5eead4;font-weight:600;}
    .nav-item span.icon{opacity:.85;width:1.25rem;text-align:center;}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.85rem 1.25rem;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
    .icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:grid;place-items:center;color:var(--muted);}
    .content{padding:1.25rem;flex:1;}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;align-items:start;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);}
    .card h3{margin:0 0 .75rem;font-size:.95rem;font-weight:650;}
    .chart-wrap{position:relative;height:340px;}
    .muted{color:var(--muted);font-size:.92rem;margin:0 0 .75rem;}
    @media (max-width:900px){.grid{grid-template-columns:1fr;}}
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app-mobile.css') }}">
  <script src="{{ url_for('static', filename='js/site-mobile-nav.js') }}" defer></script>
</head>
<body>
  <div class="layout">
    <div class="nav-backdrop js-nav-backdrop" aria-hidden="true"></div>
    <aside class="sidebar" id="app-sidebar" aria-label="Sidebar navigation">
      <div class="logo"><div class="logo-icon" aria-hidden="true">⌂</div><div>House Price Prediction</div></div>
      <div class="nav-scroll">
        <a class="nav-item" href="{{ url_for('dashboard') }}"><span class="icon">▣</span> Dashboard</a>
        <a class="nav-item" href="{{ url_for('analytics') }}"><span class="icon">📊</span> Analytics</a>
        <a class="nav-item" href="{{ url_for('price_prediction') }}"><span class="icon">💹</span> Price Prediction</a>
        <a class="nav-item" href="{{ url_for('location_analysis') }}"><span class="icon">📍</span> Location Analysis</a>
        <a class="nav-item active" href="{{ url_for('trends') }}"><span class="icon">📈</span> Trends</a>
        <a class="nav-item" href="{{ url_for('comparison') }}"><span class="icon">⚖</span> Comparison</a>
        <a class="nav-item" href="{{ url_for('logout') }}"><span class="icon">⎋</span> Logout</a>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-lead">
          <button type="button" class="nav-toggle icon-btn" aria-controls="app-sidebar" aria-expanded="false" aria-label="Open menu"><span aria-hidden="true">☰</span></button>
          <div class="topbar-title">Trends</div>
        </div>
        <button class="icon-btn" type="button" id="themeToggle" title="Toggle theme">🌙</button>
      </header>

      <div class="content">
        <div class="grid">
          <div class="card">
            <h3>Mean price by year built</h3>
            <p class="muted">Recent window based on the latest years present in HPP.csv.</p>
            <div class="chart-wrap"><canvas id="chartLine"></canvas></div>
          </div>
          <div class="card">
            <h3>Price distribution</h3>
            <p class="muted">Histogram of prices (₹ Lakhs).</p>
            <div class="chart-wrap"><canvas id="chartHist"></canvas></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.HP_CHARTS = {{ charts_json | safe }};
    const textColor = getComputedStyle(document.body).getPropertyValue('--text').trim() || '#0f172a';
    const muted = getComputedStyle(document.body).getPropertyValue('--muted').trim() || '#64748b';
    const gridColor = getComputedStyle(document.body).getPropertyValue('--border').trim() || '#e2e8f0';
    const c = window.HP_CHARTS;

    new Chart(document.getElementById('chartLine'), {
      type: 'line',
      data: { labels: c.trend_labels, datasets: [{ label: 'Mean ₹ Lakhs', data: c.trend_values, borderColor: '#0f766e', backgroundColor: 'rgba(13,148,136,0.15)', fill: true, tension: 0.25 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor } } }, scales: { x: { ticks: { color: muted }, grid: { color: gridColor } }, y: { ticks: { color: muted }, grid: { color: gridColor } } } },
    });

    new Chart(document.getElementById('chartHist'), {
      type: 'bar',
      data: { labels: c.hist_labels, datasets: [{ label: 'Count', data: c.hist_counts, backgroundColor: 'rgba(59,130,246,0.45)', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor } } }, scales: { x: { ticks: { color: muted }, grid: { color: gridColor } }, y: { ticks: { color: muted }, grid: { color: gridColor }, beginAtZero: true } } },
    });

    document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('theme-dark'));
  </script>
</body>
</html>
